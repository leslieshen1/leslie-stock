name: premarket-report-card

# 盘前报告(Claude Opus 4.8)+ 分享卡片 —— 全程线上,脱离本地 Mac。
# 北京 20:35 = 12:35 UTC = 美东 08:35 ET(EDT,开盘前约 1h;冬令时变 07:35 ET 可接受)。
# 报告发布到 /reports(git push → Vercel Git 集成自动部署);卡片落 data/cards/ 一并提交。
on:
  # 定时触发改由 Vercel Cron 准点派发(/api/cron/premarket → 本 workflow)。
  # GitHub 自家 schedule 在本仓库延迟数小时/常丢,已弃用。保留手动 + Vercel 入口。
  workflow_dispatch: {}

concurrency:
  group: premarket
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync

      - name: Install Chrome (卡片渲染用)
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update -q
          sudo apt-get install -y /tmp/chrome.deb

      - name: 盘前报告(Claude Opus 4.8)→ 发布 → 卡片
        env:
          NDT_API_KEY: ${{ secrets.NDT_API_KEY }}
          NDT_CLAUDE_KEY: ${{ secrets.NDT_CLAUDE_KEY }}
          NDT_BASE_URL: ${{ secrets.NDT_BASE_URL }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          CARD_OUT_DIR: data/cards
          CHROME_BIN: /usr/bin/google-chrome-stable
        run: |
          set -e
          ET_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          ET_YMD=$(TZ=America/New_York date +%Y%m%d)
          # 0) 美股休市日(假日/周末)不发盘报 —— 2026-06-19 Juneteenth 曾空跑生成两条。含观察日;2028+ 补名单。
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-06-19 2026-07-03 2026-09-07 2026-11-26 2026-12-25 2027-01-01 2027-01-18 2027-02-15 2027-03-26 2027-05-31 2027-06-18 2027-07-05 2027-09-06 2027-11-25 2027-12-24"
          if [ "$(TZ=America/New_York date +%u)" -ge 6 ] || echo "$HOLIDAYS" | grep -qw "$ET_DATE"; then
            echo "⏭ $ET_DATE 美股休市,跳过盘前盘报"; exit 0
          fi
          # 1) 报告(Claude Opus 4.8;云端无邮件 secret → --no-email)
          uv run python scripts/premarket_report.py --no-email
          # 1b) 市场日历(未来10天财报+宏观)—— 本地 refresh 已停,挪到这条云上 cron 每天刷;抓空不覆盖(脚本内已保护)
          uv run python -m fetchers.market_calendar || echo "⚠ 日历抓取失败,保留旧数据"
          MD="data/reports/premarket_${ET_YMD}.md"
          TITLE=$(head -1 "$MD" | sed 's/^# *//')
          # 2) 发布到 /reports
          uv run python scripts/publish_report.py --type premarket --time "08:30 ET" \
            --title "$TITLE" --file "$MD" --date "$ET_DATE"
          # 3) 分享卡片(渲染失败不阻塞报告发布)
          uv run python scripts/share_card.py --type premarket --spec data/reports/premarket_spec.json || echo "⚠ 卡片渲染失败,跳过(报告已发)"

      - name: Commit & push(触发 Vercel Git 集成部署)
        run: |
          git config user.name "premarket-bot"
          git config user.email "premarket-bot@users.noreply.github.com"
          git add web/public/data/reports.json web/public/data/market-calendar.json data/reports/ data/cards/ 2>/dev/null || true
          if git diff --cached --quiet; then echo "无变化,跳过"; exit 0; fi
          git commit -m "report: 盘前报告 + 卡片 $(TZ=America/New_York date +%F)(线上 Claude Opus 4.8)"
          for i in 1 2 3; do git push && break || { git pull --rebase; sleep 3; }; done

      - name: Deploy to Vercel(报告发布到 /reports 要靠它,别只 commit)
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "无 VERCEL_TOKEN —— 跳过部署(报告已进仓库,但不会上线!请配 VERCEL_TOKEN)"; exit 0; fi
          cd web
          npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel@latest deploy --prod --yes --archive=tgz --token=$VERCEL_TOKEN

      # 顺手 ping 板块热力:此刻=盘前时段,访问一下就把「盘前」段定格进 Upstash
      # (热力图是机会式快照,盘前没流量就空;piggyback 在这条已有的盘前 cron 上,不新增 cron)
      - name: 触发板块「盘前」快照
        if: always()
        run: |
          sleep 25
          curl -s "https://stockgod.xyz/api/sector-sessions" -o /dev/null || true
          echo "pinged /api/sector-sessions → 盘前段快照"
