# 五神对决 · 引擎(收盘撮合)—— 机械止损 → AI 单 → 规则兜底 → 结账 → arena.json。
# 00:20 UTC(周二~六)= 20:20 ET(周一~五,EDT)。依赖本地 17:00 ET refresh 已把
# 当日收盘(us-stocks/price-history-30d)提交上库;数据不新鲜时自动跳过不乱记账。
name: arena-engine
on:
  # 触发改用 cron-job.org 准点打 /api/cron/arena-engine(GitHub schedule 常延迟/丢,已移除)
  workflow_dispatch: {}
concurrency: arena
permissions:
  contents: write
jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: 收盘撮合 + 结账
        run: python scripts/arena_cloud.py engine
      - name: 提交账本
        run: |
          git config user.name "arena-bot"
          git config user.email "arena-bot@users.noreply.github.com"
          git add data/arena-state.json web/public/data/arena.json
          if git diff --cached --quiet; then echo "无变化"; exit 0; fi
          git commit -m "arena: 收盘结账 $(date -u +%F)"
          for i in 1 2 3; do git push && break || { git pull --rebase; sleep 3; }; done

      - name: Deploy to Vercel(arena.json 要部署才上 /arena,别只 commit)
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "无 VERCEL_TOKEN,跳过部署(结账已进仓库,但 /arena 不会更新)"; exit 0; fi
          cd web
          npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel@latest deploy --prod --yes --archive=tgz --token=$VERCEL_TOKEN
