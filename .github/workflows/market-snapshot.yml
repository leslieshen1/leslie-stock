name: market-snapshot
# Phase 1:在 GitHub 上拉行情、产出快照,force-push 到独立分支 data-live(不碰 main、不触发 Vercel 部署)。
# Vercel 端点读 raw.githubusercontent.com/<repo>/data-live/*.json。用 GITHUB_TOKEN,无需任何用户 secret。
# 先只手动触发验证;验好了再加 schedule(盘中每 5 分钟)。
on:
  workflow_dispatch:
  schedule:
    # 公开仓 = GitHub Actions 免费无限。按两市交易时段每 5 分钟刷(休市不刷,价格本就不变 + 对上游礼貌)。
    - cron: "*/5 1-7 * * 1-5"    # A 股:UTC 1-7 = 北京 9:00-15:55
    - cron: "*/5 8-23 * * 1-5"   # 美股:UTC 8-23 = ET 4:00-19:55(盘前到盘后)

permissions:
  contents: write

concurrency:
  group: market-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 自循环 ~50min·每 5 分钟刷一次 → 抹平 GitHub */5 schedule 不准(实测它只稀疏~每小时触发一次)。
      # 盘中被触发一次就把后续近一小时的快照都刷新鲜了,前端直读快照(/scan)+ /api/market 才真省到。
      # concurrency cancel-in-progress=true:schedule 真频繁触发时彼此取消重启(每次=一刷);稀疏时本循环兜住空档。
      - name: 循环刷快照到 data-live
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for i in $(seq 1 11); do
            if OUT_DIR=/tmp/snap node scripts/snapshot/build_snapshot.mjs; then
              ( cd /tmp/snap
                rm -rf .git
                git init -q
                git config user.email "snapshot-bot@users.noreply.github.com"
                git config user.name "snapshot-bot"
                git checkout -q -b data-live
                git add -A
                git commit -q -m "snapshot $(date -u +%FT%TZ)"
                git push -f "$REPO" data-live && echo "pushed #$i $(date -u +%T)" )
            else
              echo "build #$i failed, skip push"
            fi
            [ "$i" -lt 11 ] && sleep 300
          done
