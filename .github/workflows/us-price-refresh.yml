name: us-price-refresh

# 云端权威价格刷新(脱离本地 Mac)—— 美股收盘后由 cron-job.org 打 /api/cron/us-price 派发。
# 抓 /api/market 当日收盘 → 更新 us-stocks 价 + price-history(保留 seg/sub/sub2/capDup)→ 提交。
# 提交后 push 到 main:① Vercel git 集成自动部署(热力图拿到新价)② arena-engine 紧随其后结账(cron-job.org 排在本任务之后 ~30min)。
# 可靠性:脚本抓不到足够多的票(<3000)直接中止不写;push 重试+rebase+autostash。

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: us-price-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: 刷新价格(/api/market → us-stocks + price-history,纯 stdlib 无依赖)
        run: python scripts/cloud_price_refresh.py
      - name: 提交并推送
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add web/public/data/us-stocks.json web/public/data/price-history-30d.json
          if git diff --cached --quiet; then echo "价格无变化,跳过"; exit 0; fi
          git commit -m "chore: 云端收盘价刷新 $(TZ=America/New_York date +%F)"
          for i in 1 2 3; do git push && break || { git pull --rebase --autostash; sleep 3; }; done
