name: Refresh Data & Deploy

# 数据自动刷新 — 脱离本地 Mac,GitHub 云端定时跑。
#
# 日更只刷行情(yfinance,海外 runner 友好),避免每天重写 5510 个 analysis JSON。
# 评分/whale/分析 只在你本地深度分析后手动 commit + 部署。
#
# 需要的 secrets(在 repo Settings → Secrets → Actions 配):
#   VERCEL_TOKEN       Vercel 账号 token(vercel.com/account/tokens)
#   (TUSHARE_TOKEN 可选,行情走 yfinance 不需要)

on:
  schedule:
    - cron: "30 8 * * 1-5"    # UTC 08:30 = 北京 16:30(A股收盘后) 工作日
  workflow_dispatch: {}        # 手动触发按钮(Actions 页面点 Run)

permissions:
  contents: write              # 允许 bot commit 行情数据

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python deps
        run: uv sync

      - name: Refresh quotes (yfinance)
        run: uv run python web/data/fetch_pulse.py

      - name: Commit quote snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/pulse-snapshot.json web/public/data/pulse-supplement.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "行情无变化,跳过 commit"
          else
            git commit -m "chore: 行情自动刷新 $(date -u +%Y-%m-%d)"
            git push
          fi

      # 部署:仅当配了 VERCEL_TOKEN 才走 CLI 部署;没配则跳过(不再让整个 run 变红)。
      # 未配 token 时,上一步 git push 到 main 会由 Vercel 的 Git 集成自动部署
      # (vercel.json: git.deploymentEnabled.main = true),数据照样上线。
      - name: Deploy to Vercel (CLI, 可选)
        if: ${{ success() && secrets.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd web
          npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel@latest deploy --prod --yes --archive=tgz --token=$VERCEL_TOKEN

      - name: 部署方式说明
        if: ${{ success() && secrets.VERCEL_TOKEN == '' }}
        run: echo "未配 VERCEL_TOKEN —— 跳过 CLI 部署,改由 git push→main 触发 Vercel Git 集成自动部署。"
